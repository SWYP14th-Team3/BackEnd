name: ResuFit Backend CI Pipeline

#develop 브랜치를 향해 PR(Pull Request)을 생성하거나 변경사항을 push할 때 실행됩니다.
on:
  pull_request:
    branches: [ "develop" ]
  push:
    branches: [ "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. 깃허브 가상 컴퓨터로 PR이 날아온 최신 소스코드 다운로드
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. 자바 17 환경 셋업
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Gradle 빌드 전 실행 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. 의존성 다운로드 및 테스트/빌드 실행
      - name: Build and Test with Gradle
        run: ./gradlew build -x test # 잠시 테스트 제외

      # 5. 테스트 결과 보고서 아티팩트 저장
      # 빌드가 실패했을 때 어떤 테스트가 터졌는지 깃허브 Actions 탭에서 보고서를 쉽게 열어볼 수 있도록 백업합니다.
      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/test

      # 6. 슬랙 알림 통합 (성공/실패 분기 처리)
      - name: Slack Notification
        if: always() # 빌드 검증 성공이든 실패든 팀원들에게 무조건 결과 공유
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: general # 알림 보낼 슬랙 채널명
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
          SLACK_TITLE: ${{ job.status == 'success' && '✅ ResuFit CI 검증 성공' || '⚠️ ResuFit CI 검증 실패 (코드 오류)' }}
          SLACK_MESSAGE: |
            **작업자:** ${{ github.actor }}
            **커밋 메시지:** ${{ github.event.head_commit.message }}
            테스트 보고서 및 상세 로그 확인: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}