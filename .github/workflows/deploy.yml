name: ResuFit Backend CD Pipeline

on:
  push:
    branches: [ "develop" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스코드 체크아웃
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. 자바 25 환경 셋업
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      # 3. Gradle 빌드 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Jar 파일 빌드 (이미지 빌드팩 대신 직접 빌드)
      - name: Build with Gradle
        run: ./gradlew clean build -x test

      # 5. 도커 이미지 빌드 (Dockerfile 사용)
      - name: Build Docker Image
        run: |
          docker build -t resufit-app:latest .
          docker save -o resufit-app.tar resufit-app:latest

      # 6. EC2로 파일 전송 (Dockerfile 빌드 방식에 맞춰 수정)
      - name: Transfer Files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "resufit-app.tar,docker-compose.yml"
          target: "/home/ubuntu/app"

      # 7. 서버 배포 실행
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/app
            docker-compose down
            docker load -i resufit-app.tar
            rm resufit-app.tar
            ENV_FILE=.env.prod docker-compose up -d

      # 8. 슬랙 알림 (존재하는 채널명 확인 필수)
      - name: Slack Notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: '개발-알림'
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
          SLACK_TITLE: ${{ job.status == 'success' && '🚀 ResuFit 배포 성공' || '❌ ResuFit 배포 실패' }}
          SLACK_MESSAGE: |
            *커밋:* ${{ github.event.head_commit.message }}
            *결과:* ${{ job.status }}
            상세 확인: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}