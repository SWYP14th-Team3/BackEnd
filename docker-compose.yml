services:
  mysql:
    image: mysql:8.0
    container_name: backenddb
    ports:
      - "3306:3308"
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: resume
    volumes:
      - mysql-data:/var/lib/mysql
    command: --port=3308 --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  mysql-data:
