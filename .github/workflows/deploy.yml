name: ResuFit Backend CD Pipeline

on:
  push:
    branches: [ "develop" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 깃허브 가상 컴퓨터로 develop 최신 소스코드 다운로드
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. 자바 17 환경 셋업
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Gradle 빌드 전 실행 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Spring Boot 앱을 도커 이미지로 빌드 (테스트는 일단 제외)
      - name: Build Spring Boot Docker Image
        run: ./gradlew bootBuildImage --imageName=resufit-app:latest

      # 5. 빌드된 앱 이미지를 파일(.tar)로 압축 가공
      - name: Save Docker Image to Tar
        run: docker save -o resufit-app.tar resufit-app:latest

      # 6. 압축한 앱 이미지(tar)와 docker-compose.yml 지침서만 AWS 서버로 전송
      - name: Transfer Files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "resufit-app.tar,docker-compose.yml"
          target: "/home/ubuntu/app"

      # 7. AWS EC2 서버 원격 조종(SSH)하여 배포 갱신 및 올인원 실행
      - name: Deploy to EC2 with Docker Compose
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/app
            
            docker-compose down
          
            docker load -i resufit-app.tar
            rm resufit-app.tar
          
            ENV_FILE=.env.prod docker-compose up -d

      # 8. 슬랙 알림 통합 (성공/실패 분기 처리 가능)
      - name: Slack Notification
        if: always() # 성공이든 실패든 무조건 실행
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: general # 알림 보낼 슬랙 채널명
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
          SLACK_TITLE: ${{ job.status == 'success' && '🚀 ResuFit 배포 성공' || '❌ ResuFit 배포 실패' }}
          SLACK_MESSAGE: |
            **커밋 메시지:** ${{ github.event.head_commit.message }}
            로그인 후 확인창: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}