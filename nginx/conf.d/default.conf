server {
    listen 80 default_server;
    server_name api.resufit.site;

    location = /nginx-health {
        default_type text/plain;
        return 200 "ok\n";
    }

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.resufit.site;

    ssl_certificate /etc/letsencrypt/live/api.resufit.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.resufit.site/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    # 실제 이력서 제한은 백엔드에서 10MB로 검증
    # multipart 요청의 부가 데이터를 고려해 Nginx는 조금 넉넉하게 설정
    client_max_body_size 15M;

    location = /nginx-health {
        default_type text/plain;
        return 200 "ok\n";
    }

    location / {
        proxy_pass http://resufit-app:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # LLM 분석 요청이 길어질 가능성을 고려
        proxy_connect_timeout 10s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }
}